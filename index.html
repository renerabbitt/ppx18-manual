heading","text":"1. Changing to Walkout Basement"},{"type":"heading","text":"Open Layout Label Options file"},{"type":"paragraph","text":"Change %$is_walkout = \"false\"% to %$is_walkout = \"true\"% Save the file Review all floor labels and sections"},{"type":"heading","text":"2. Customizing Floor Names"},{"type":"heading","text":"Open Layout Label Options file"},{"type":"paragraph","text":"Modify %$floor1Name% and %$mainFloorName% values Save the file New labels will use the updated names"},{"type":"heading","text":"3. Adjusting Sheet Size"},{"type":"heading","text":"Open Layout Label Options file"},{"type":"paragraph","text":"Change %$sheet_size% value Save the file Review detail placement"},{"type":"heading","text":"4. Modifying Label Appearance"},{"type":"heading","text":"Open Layout Label Options file"},{"type":"paragraph","text":"Adjust padding, spacing, and font size values Save the file Test with new labels"},{"type":"heading","text":"Troubleshooting"},{"type":"heading","text":"1. Labels Not Updating"},{"type":"paragraph","text":"Make sure you saved the Layout Label Options file Check that you're using the correct format for values Verify that keywords in remove lists are comma-separated"},{"type":"heading","text":"2. Detail Placement Issues"},{"type":"paragraph","text":"Verify sheet size setting is correct Check detail grid configuration values Make sure center point coordinates are appropriate"},{"type":"heading","text":"3. Scale Display Problems"},{"type":"paragraph","text":"Check scale removal keywords are correct Verify spacing adjustment values Test different padding characters Remember: Always save the Layout Label Options file after making changes. The system will only apply your changes after the file is saved."},{"type":"paragraph","text":"Test your changes with a sample detail before applying them projectwide to ensure they work as expected."},{"type":"heading","text":"LAYOUT USER OPTIONS"},{"type":"heading","text":"LAYOUT USER OPTIONS CONT."},{"type":"heading","text":"2. Font Sizes"},{"type":"paragraph","text":"Find the line: %$box_label_font_size = \"5/32\"% Change the fraction to adjust main label text size Find the line: %$box_scale_font_size = \"1/8\"% Change the fraction to adjust scale text size"},{"type":"heading","text":"3. Scale Display"},{"type":"paragraph","text":"Find the line: %$space_adjustment = \"15\"% Change the number to adjust spacing between \"Scale:\" and measurements Find the line: %$box_scale_char = \"—\"% Change the character between quotes to use a different scale spacing character Find the line: %$removeScale = \"schedule, legend, keynotes, standards, render, window\"% Add or remove keywords to control which views don't show scales"},{"type":"heading","text":"Detail Layout Configuration"},{"type":"paragraph","text":"These settings control how details are organized on your sheets."},{"type":"heading","text":"1. Sheet Size"},{"type":"paragraph","text":"Find the line: %$sheet_size=\"ANSI D\"% Change to your desired sheet size (ANSI A, B, C, D, E, or custom) Sheet size affects detail placement and organization"},{"type":"heading","text":"2. Detail Grid Configuration"},{"type":"paragraph","text":"Find the line: %$ansi_d=\"4.0,4.0,8,5,-14,9\"% This controls detail placement on ANSI D sheets"},{"type":"heading","text":"Format"},{"type":"paragraph","text":"\"grid_width,grid_height,num_details_wide,num_details_tall,center_x,cent er_y\""},{"type":"heading","text":"Adjust these values to change"},{"type":"paragraph","text":"Grid cell size (width and height) Number of details that fit on the sheet Center point for detail placement"},{"type":"heading","text":"How to Use These Settings"},{"type":"heading","text":"1. Setting Up a New Project"},{"type":"paragraph","text":"Open the Layout Label Options file from the right sidebar Modify the values as needed for your project Save the file to apply changes Changes take effect immediately for new labels"},{"type":"heading","text":"2. Modifying Existing Projects"},{"type":"paragraph","text":"Open the Layout Label Options file Make your desired changes Save the file Existing labels may need to be updated manually"},{"type":"heading","text":"3. Best Practices"},{"type":"paragraph","text":"Make a backup of your settings file before making changes Test changes with a sample detail before applying project-wide Keep a record of your preferred settings for future projects"}],"imageRequest":"Optional screenshot or diagram for Common layout tasks"},{"id":32,"title":"Pre-built showers","description":"Modular shower tools and 3D replacement","blocks":[{"type":"heading","text":"PRE-BUILT SHOWERS"},{"type":"paragraph","text":"Its built from a custom cabinet where each face item is a custom cabinet door. The importance of this approach is that custom cabinet doors can be swapped in any 3D view directly from the library. This means we can swap out for solid walls, glass walls, partitions, back splashes or shower doors with a single click. The sloped shower pan is technically a millwork"},{"type":"paragraph","text":"symbol it is applied as a shelf on the shower door. By default if there are new separations created in modifying a shower,, those separations with generate a break in the shower pan. Make sure to delete any separations created from splitting any face item either vertically or horizontally."},{"type":"heading","text":"MODIFYING A PRE-BUILT SHOWER"},{"type":"heading","text":"Common edits"},{"type":"paragraph","text":"By default all shower doors are locked. We can plug in the width of a door and it will keep the door locked, or we can unlock the door and if the front side of the entire cabinet is resized all components will resize equally."},{"type":"paragraph","text":"For some users its easier to understand by reverse engineering."},{"type":"paragraph","text":"You can open a complex cabinet that is prebuilt and look at front left left and right sides to take a look at how a complex shower can be built You can search in the prebuilt showers component folder for different cabinet doors and use the 3D camera view you can hover over a component of these prebuilt showers and swap it with the new component as shown to the left"},{"type":"paragraph","text":"Most pre-built showers can have their heights raised which will raise the backsplash without raising the glass walls."},{"type":"paragraph","text":"In the case that you need to install a shower niche or window the best approach is to delete the entire face side item. This would be a common occurrence for a prebuilt shower that has either a terminating wall or a backsplash wall. After you delete the entire face side item, install your window or niche as you typically would and use a backsplash tool to create your"},{"type":"paragraph","text":"backsplash. Please note: because the showers are built out of cabinets, the backsplash tool will not work unless drawn outside of the area of the shower and brought into the area of the shower afterwards. This is a limitation of the software."},{"type":"paragraph","text":"Due to a limitation in the software, all tile materials applied to these tools need to have“Global Symbol Mapping” checked in order for the tile to be sized properly on components"},{"type":"heading","text":"MODIFYING A PRE-BUILT BATH"},{"type":"heading","text":"Common edits"},{"type":"paragraph","text":"If you would like to add more baths for the prebuilt bath system, you can convert any symbol with the convert symbol tool to a cabinet door/drawer by clicking show advanced options and change the offset of the Y position in advance sizing as shown to the left."},{"type":"paragraph","text":"Shower with terminating side wall Apron bath with sliding door Apron bath with bypass doors Half wall with end-caps Half wall with top-caps Partial full side wall Full side wall with front half wall Standard with sliding door Glass corner with half wall Standard shower with bypass doors Front half wall Standard 3-side backsplash with shower door Standard 3-side extended backsplash with shower door"},{"type":"paragraph","text":"One side half wall and front side half wall"}],"imageRequest":"Optional screenshot or diagram for Pre-built showers"},{"id":33,"title":"Model performance","description":"Model and texture performance guidance","blocks":[{"type":"heading","text":"MODEL AND TEXTURE PERFORMANCE"},{"type":"paragraph","text":"This page was contributed by Brooke Stalker please go check her socials out at this link. Thanks Brooke!"},{"type":"paragraph","text":"Feeling a bit sluggish“ Are you attempting to use Chief's ray trace feature, but your computer seems unable to keep pace”"},{"type":"paragraph","text":"If you're using a 2000 series RTX card, an A Series RTX, a Quadro, or a Mac M1 or M2 Graphics card, it’s essential to adjust your default camera settings. For optimal design when utilizing Ray Trace, modifying your DEFAULT settings is the best strategy."},{"type":"paragraph","text":"Start by expanding the 3D View Defaults and selecting Rendering Techniques. Within the Physically Based (Ray-Trace) Panel, look for the Global Illumination section. Here, set both Opaque Bounces and Transmissive/Specular Bounces to 2. Additionally, change your Maximum Samples to 20. Save these changes by clicking OK, and we can proceed to the next step."},{"type":"paragraph","text":"Returning to the default settings, locate the Camera Tools Sub-Menu and adjust the Floor Camera settings. In the middle of the initial screen that appears when selecting Camera Tools, you'll find a section labeled AMD FidelityFX. Click the drop-down menu and change the setting to Performance (2.0)."},{"type":"paragraph","text":"This option employs AI to interpret a downscaled resolution image, meaning it will reduce the number of pixels Chief Architect needs to render. This will ease the load on your older machine, saving you from frustration."},{"type":"paragraph","text":"For final renders you can increase your maximum sample rate back to a range of 100 to 500 and revert your FidelityFX to Native Resolution. This process may take some time, so feel free to enjoy a coffee break. Another helpful resource is to use an AI enhancement tool like Krea.ai."},{"type":"paragraph","text":"If at any point you're feeling lost during this explanation and would prefer a video walkthrough, double click below to check out our YouTube video tutorial."},{"type":"heading","text":"Optimization and Performance"},{"type":"heading","text":"Overview"},{"type":"paragraph","text":"Ever wondered how we manage to deliver such realistic-looking models while keeping your system running smoothly? We've gone the extra mile to optimize everything we create, ensuring you get the best possible performance without sacrificing quality. Think of it as having a highperformance sports car that's also fuel-efficient we've fine-tuned every aspect to give you the best of both worlds."},{"type":"heading","text":"Model Optimization"},{"type":"heading","text":"We take Chief Architect's internal requirements seriously"},{"type":"heading","text":"1. Polycount Management"},{"type":"list","text":"We strictly adhere to Chief Architect's polycount limits"},{"type":"list","text":"Every model is optimized for real-time performance"},{"type":"list","text":"We maintain visual quality while minimizing geometry"},{"type":"list","text":"This means faster rendering and smoother navigation"},{"type":"heading","text":"2. Vector Line Optimization"},{"type":"list","text":"We minimize the number of vector lines in plans"},{"type":"list","text":"This reduces system load during drafting"},{"type":"list","text":"Keeps your plans clean and professional"},{"type":"list","text":"Allows for better performance on all systems"},{"type":"heading","text":"Texture Optimization"},{"type":"heading","text":"Our texture system is carefully balanced for quality and performance"},{"type":"heading","text":"1. Primary Textures"},{"type":"list","text":"Optimized at 1024x1024 resolution"},{"type":"list","text":"Carefully compressed for maximum quality"},{"type":"list","text":"Maintains realistic appearance"},{"type":"list","text":"Keeps file sizes manageable"},{"type":"heading","text":"2. Secondary Textures"},{"type":"list","text":"Set at 768x768 resolution"},{"type":"list","text":"Used for less critical details"},{"type":"list","text":"Reduces memory usage"},{"type":"list","text":"Maintains visual consistency"},{"type":"heading","text":"Performance Benefits"},{"type":"heading","text":"These optimizations mean you get"},{"type":"heading","text":"1. Faster Rendering"},{"type":"list","text":"Quick ray trace previews"},{"type":"list","text":"Smooth real-time navigation"},{"type":"list","text":"Efficient memory usage"},{"type":"list","text":"Better overall performance"},{"type":"paragraph","text":"Remember: Our optimization efforts are designed to give you the best possible experience, regardless of your system's age or specifications."},{"type":"paragraph","text":"We've carefully balanced quality and performance to ensure you can focus on design while your system runs smoothly. Let our optimizations handle the technical details while you focus on creating amazing designs."},{"type":"heading","text":"MACHINE OPTIMIZATION"},{"type":"paragraph","text":"Once your scene is arranged and your camera is positioned, you can edit your active camera view by finding this icon."},{"type":"paragraph","text":"To locate your Defaults, click on EDIT Menu and select Default Settings, or find the Wrench icon, which will lead you to the same dialog box"}],"imageRequest":"Optional screenshot or diagram for Model performance"},{"id":34,"title":"Glossary","description":"OIP, SPV, NVP, and other common terms","blocks":[{"type":"heading","text":"GLOSSARY"},{"type":"paragraph","text":"OIP - Object Information Panel. This exists for all publishing objects such as a Cabinet or a Polyline"},{"type":"heading","text":"SPV- Saved Plan View"},{"type":"paragraph","text":"NVP-Name Value Pair, such as %width% is 36\" for a cabinet"}],"imageRequest":"Optional screenshot or diagram for Glossary"},{"id":35,"title":"Limited use agreement","description":"Agreement for non-purchasing collaborators","blocks":[{"type":"heading","text":"EXTENDED USER AGREEMENT FOR SHARING PLANS WITHIN"},{"type":"heading","text":"COUNTRIES THAT UPHOLD INTELLECTUAL PROPERTY LAWS"},{"type":"heading","text":"RABBITT DESIGN LIMITED USE AGREEMENT FOR NON-PURCHASING COLLABORATORS"},{"type":"paragraph","text":"The collaborator (\"User\") acknowledges that the primary purchaser (\"Client\") of the Rabbitt Design templates, CAD files, and/or macros (\"Materials\") has granted limited access to the Materials solely for the purpose of supporting the Client’s specific project. By participating in"},{"type":"heading","text":"this collaboration, the User agrees to the following"},{"type":"heading","text":"1.Limited Use Only"},{"type":"list","text":"User may not use, reproduce, share, or modify the Rabbitt Design Materials for any other project, client, or purpose outside the scope of"},{"type":"paragraph","text":"this collaboration. No part of the Materials may be stored for future use or repurposed in any way."},{"type":"heading","text":"3.No Redistribution"},{"type":"list","text":"Under no circumstances may the User distribute or share the Rabbitt Design Materials with any third party, whether publicly or privately."},{"type":"heading","text":"5.Support Restrictions"},{"type":"list","text":"All plan-related troubleshooting, questions, and feedback must be handled through the Rabbitt Design Discord server or official forums."},{"type":"paragraph","text":"Users requiring deeper customization, support, or access to updates should purchase their own license or file package through www.RabbittDesign.net."},{"type":"list","text":"Required Clean-Up for Shared Files"},{"type":"list","text":"All CAD details, macros, and embedded template data must be deleted prior to sharing any plan files publicly."},{"type":"list","text":"System Updates & Notices"},{"type":"list","text":"Notifications of updates or system changes are only shared via the official Rabbitt Design Discord server. Users not in the server will not"},{"type":"paragraph","text":"receive update alerts."},{"type":"paragraph","text":"By continuing with this project, the User affirms that they understand and accept these terms. Unauthorized use may result in revoked access, removal from the project, and/or legal action."},{"type":"paragraph","text":"This work product is a labor of love, there has never been a margin of profit in these products due to the technical support and infrastructure required to maintain them. As you can see, it took a tremendous amount of time to develop all of these systems, even from a conceptual and inceptual basis. If these products are leaked or distributed they become worthless. Please respect this and only share as"},{"type":"paragraph","text":"needed with people you trust and encourage them to buy into the system as well"}],"imageRequest":"Optional screenshot or diagram for Limited use agreement"}];</script>
