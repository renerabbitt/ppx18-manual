  <script>window.MANUAL_CHAPTERS=[{"id":1,"title":"Index","description":"This manual is under construction. Choose a chapter to open the current working instructions.","blocks":[{"type":"heading","text":"Manual under construction"},{"type":"paragraph","text":"This PPX18 manual is actively being written, corrected, and illustrated. Some chapters are incomplete and instructions may change as the product and documentation are finalized. Check this live manual for the latest published information."}],"imageRequest":"Manual under construction notice","image":"/images/manual-under-construction.jpg","imageAlt":"Yellow and black striped Manual Under Construction warning","chapterLinks":[{"label":"Tags & library search","targetTitle":"Tags & library search","targetId":2},{"label":"Toolbars","targetTitle":"Toolbars","targetId":3},{"label":"Toolbar icons: core tools","targetTitle":"Toolbar icons: core tools","targetId":4},{"label":"Toolbar icons: cabinets","targetTitle":"Toolbar icons: cabinets","targetId":5},{"label":"Toolbar icons: fillers","targetTitle":"Toolbar icons: fillers","targetId":6},{"label":"Toolbar icons: appliances","targetTitle":"Toolbar icons: appliances","targetId":7},{"label":"Managed mode","targetTitle":"Managed mode","targetId":8},{"label":"New construction","targetTitle":"New construction","targetId":9},{"label":"Project information","targetTitle":"Project information","targetId":10},{"label":"Project preferences","targetTitle":"Project preferences","targetId":11},{"label":"Area analysis","targetTitle":"Area analysis","targetId":12},{"label":"Automatic object labels","targetTitle":"Automatic object labels","targetId":13},{"label":"Label replacement","targetTitle":"Label replacement","targetId":14},{"label":"Walls","targetTitle":"Walls","targetId":15},{"label":"Detail designations","targetTitle":"Detail designations","targetId":16},{"label":"Details","targetTitle":"Details","targetId":17},{"label":"Stackable details","targetTitle":"Stackable details","targetId":18},{"label":"Annotation tool","targetTitle":"Annotation tool","targetId":19},{"label":"Pro Layout","targetTitle":"Pro Layout","targetId":20},{"label":"Braced wall panels","targetTitle":"Braced wall panels","targetId":21},{"label":"Ventilation tools","targetTitle":"Ventilation tools","targetId":22},{"label":"Framing","targetTitle":"Framing","targetId":23},{"label":"Kitchen and cabinet workflow","targetTitle":"Kitchen and cabinet workflow","targetId":24},{"label":"Spreadsheet integration","targetTitle":"Spreadsheet integration","targetId":25},{"label":"Materials and exterior graphics","targetTitle":"Materials and exterior graphics","targetId":26},{"label":"Cameras and dimensions","targetTitle":"Cameras and dimensions","targetId":27},{"label":"Update or Install Instructions","targetTitle":"Update or Install Instructions","targetId":28},{"label":"Transfer to Pro Plan","targetTitle":"Transfer to Pro Plan","targetId":29},{"label":"Layout user options","targetTitle":"Layout user options","targetId":30},{"label":"Common layout tasks","targetTitle":"Common layout tasks","targetId":31},{"label":"Pre-built showers","targetTitle":"Pre-built showers","targetId":32},{"label":"Model performance","targetTitle":"Model performance","targetId":33},{"label":"Glossary","targetTitle":"Glossary","targetId":34},{"label":"Limited use agreement","targetTitle":"Limited use agreement","targetId":35}]},{"id":2,"title":"Tags & library search","description":"Tags, stacking tags, library search, and Boolean searches","blocks":[{"type":"heading","text":"TAGS"},{"type":"paragraph","text":"Please turn on the display of Tags in your Library Settings Tags are meant to“stack” or be added together and follow the logic listed below"},{"type":"list","text":"“0-” Suffix is for Room Type designations"},{"type":"list","text":"“1-” Suffix is for mounting options that correlate with symbols"},{"type":"list","text":"“2-” Suffix are symbol/object classifications"},{"type":"list","text":"“3-” Are categories"},{"type":"list","text":"“4-” Are specific to Rabbitt Design and indicate a type of utility that a"},{"type":"paragraph","text":"symbol might have. See more information below"},{"type":"list","text":"“5-” Are characteristics"},{"type":"list","text":"“z.” Are largely internal tags for System bug reporting and repairs"},{"type":"heading","text":"“4-”Prefix Breakdown"},{"type":"list","text":"“HotSwap” indicates an element that when selected can hover"},{"type":"paragraph","text":"over something in a 3d view and toggles a swap cursor animation For instance, many of our systems utilize cabinets to represent other items. Something that is dynamic about cabinets is the hover click and replace or toggle replacement mode function of cabinet doors. Similar to replacing a panel on a railing"},{"type":"heading","text":"Stacking Tags"},{"type":"paragraph","text":"This is just a term we use to say combine your tags."},{"type":"heading","text":"Some common stacks to try"},{"type":"paragraph","text":"Wall+Light+Interior for interior sconces Floor+Material+Exterior For exterior floor surfaces Countertop/Shelf+Decor for decorations that sit on cabinet countertops or tabletops Countertop/Shelf+Painter for the Shelf Painter Tools"},{"type":"heading","text":"Countertop/Shelf+CAD/Blocks/Components+Short/Narrow"},{"type":"paragraph","text":"for the 15\" wide swappable shelf items that work with the shelf painter"},{"type":"list","text":"“Painter” represents a sprayer tool built from Style Palette. These"},{"type":"paragraph","text":"are tagged Painter because they are specifically something meant to be used as a utility to convert a Cabinet /Window /Door /Room /Backsplash /Countertop to something else. Painters are always part of a large system that includes component assemblies Tags may change over time with updates"},{"type":"list","text":"“Style Palette” represents a sprayer tool built from Style Palette"},{"type":"paragraph","text":"that is meant to change the style of something which was the original intent of the tool. Like changing from Craftsman to"},{"type":"heading","text":"Victorian"},{"type":"list","text":"“Utility/Specialty/Tools” are single one off tools that provide utility."},{"type":"paragraph","text":"Stack your tag to narrow your results"},{"type":"heading","text":"SEARCH TIPS"},{"type":"heading","text":"BOOLEAN SEARCHES"},{"type":"paragraph","text":"All Rabbitt Design items can be searched by adding the prefix“RD” to your search term. Such as RDStucco Additionally you can add Rab to any search, such as“Sofa Rab”"},{"type":"paragraph","text":"Combined with a search term, you can add in a filter by searching object classifications such as“Type” or“Symbol Type”."},{"type":"paragraph","text":"For example, search RDtoi, followed by Type:Fixture and you will most certainly find a toilet fixture in the Rabbitt Design Library Chief Architect’s Library excepts Boolean operators. This means you can search using OR or | and NOT or! and AND Give it a shot. You can search toi OR bat to find either toilets or baths."},{"type":"paragraph","text":"Add in some more complex Boolean searches and you can really find some unique items very quickly Toi OR (Bat NOT Koh) OR soap will find toilets made by any manufacturer, baths not made by Kohler, or Soap dishes."},{"type":"paragraph","text":"Add in limiters like symbol type and you have a very specific search. This should help you find exactly what you need very efficiently"}],"imageRequest":"Current PPX18 Tags panel","image":"/images/tags-panel.png","imageAlt":"Current PPX18 Tags panel showing the organized tag categories and utilities"},{"id":3,"title":"Toolbars","description":"Using, changing, and customizing toolbar configurations","blocks":[{"type":"heading","text":"Understanding how Rabbitt toolbars work"},{"type":"paragraph","text":"The Rabbitt Design Pro Plan and Full Library Bundle include a preconfigured toolbar layout that places the Rabbitt tools directly in your Chief Architect workspace."},{"type":"heading","text":"Changing toolbar configurations"},{"type":"paragraph","text":"Click the configuration buttons in the top-left of the Chief Architect window to change configurations. The highlighted button shows the configuration that is currently active."},{"type":"heading","text":"Before installing"},{"type":"paragraph","text":"Installing the Rabbitt Design toolbar configuration can overwrite toolbar customizations you previously created in Chief Architect, including repositioned toolbars, added buttons, and saved configurations. Save or back up a custom setup before installation if you want to keep it."},{"type":"heading","text":"Editing a toolbar"},{"type":"paragraph","text":"To make further changes, open Tools > Toolbars & Hotkeys > Customize Toolbars. From there, you can add, remove, or reposition tools for your workflow."}],"imageRequest":"Current toolbar configuration buttons","image":"/images/toolbar-configurations.png","imageAlt":"Toolbar configuration buttons at the top-left of Chief Architect"},{"id":4,"title":"Toolbar icons: core tools","description":"Wall, stair, railing, window, and door tools","blocks":[{"type":"paragraph","text":"Rabbitt Design toolbars include custom icons for commonly used tools and presets. Select an icon below to identify its function."}],"imageRequest":"Toolbar icon catalog","icons":[{"file":"cust_52.png","name":"New exterior wall","description":"Draws a wall on the custom layer for new exterior walls. The wall-fill color is controlled by the layer color.","toolType":"Wall tool","worksWith":"Walls"},{"file":"cust_53.png","name":"New interior wall","description":"Draws a wall on the custom layer for new interior walls. The wall-fill color is controlled by the layer color.","toolType":"Wall tool","worksWith":"Walls"},{"file":"cust_54.png","name":"6-inch interior wall","description":"Draws the 6-inch interior wall type.","toolType":"Wall tool","worksWith":"Walls"},{"file":"cust_55.png","name":"Partition wall","descript es a wall oven cabinet.","toolType":"Library object","worksWith":"Cabinets and library objects"},{"file":"cust_167.png","name":"Appliance cabinet","description":"Places the appliance cabinet configuration.","toolType":"Library object","worksWith":"Base, wall, and full-height cabinets"},{"file":"cust_171.png","name":"Integrated refrigerator","description":"Places a cabinet with an integrated refrigerator.","toolType":"Library object","worksWith":"Cabinets and library objects"},{"file":"cust_172.png","name":"Refrigerator cabinet block","description":"Places the refrigerator and surrounding cabinets as a block.","toolType":"Library object","worksWith":"Cabinets and library objects"},{"file":"cust_173.png","name":"Panel-ready refrigerator","description":"Places the integrated panel-ready refrigerator configuration.","toolType":"Library object","worksWith":"Cabinets and library objects"},{"file":"cust_178.png","name":"Appliance panel","description":"Places the custom appliance panel.","toolType":"Custom drawing tool","worksWith":"Cabinets and library objects"},{"file":"cust_177.png","name":"Omit label","description":"Omits the selected cabinet or appliance label.","toolType":"Style Palette","worksWith":"Selected object"},{"file":"cust_183.png","name":"Omit object label","description":"Removes the label from selected cabinets, doors, or windows.","toolType":"Style Palette","worksWith":"Selected object"},{"file":"cust_182.png","name":"Appliance garage sprayer","description":"Applies the appliance-garage preset with the style-painter tool.","toolType":"Style Palette","worksWith":"Base, wall, and full-height cabinets"},{"file":"cust_197.png","name":"Add molding","description":"Adds molding to the selected cabinet or room object.","toolType":"Style Palette","worksWith":"Selected object"},{"file":"cust_184.png","name":"Remove molding","description":"Removes molding from the selected cabinet or room object.","toolType":"Style Palette","worksWith":"Selected object"},{"file":"cust_220.png","name":"Automatic annotation","description":"Runs the Anno Tool for automatic annotation.","toolType":"Custom drawing tool","worksWith":"Plan objects"},{"file":"cust_221.png","name":"Linked detail callout","description":"Places the custom linked callout used by the detail system.","toolType":"Library object","worksWith":"CAD details and views"},{"file":"cust_224.png","name":"Linked section callout","description":"Places the alternate custom linked callout used by the detail system.","toolType":"Library object","worksWith":"CAD details and views"},{"file":"cust_232.png","name":"Numbered room label","description":"Places a room label containing the room number.","toolType":"Library object","worksWith":"Rooms"},{"file":"cust_215.png","name":"No-work painter","description":"Applies the no-work or out-of-scope formatting to windows, doors, and rooms.","toolType":"Custom drawing tool","worksWith":"Windows, doors, and rooms"},{"file":"cust_219.png","name":"Revert formatting","description":"Removes formatting previously applied by other window or room tools.","toolType":"Style Palette","worksWith":"Windows, doors, and rooms"},{"file":"cust_217.png","name":"Shorten labels","description":"Truncates or abbreviates labels on windows, doors, and rooms.","toolType":"Style Palette","worksWith":"Windows, doors, and rooms"},{"file":"cust_216.png","name":"Adjusted plate height","description":"Shows adjusted room plate-height information.","toolType":"Style Palette","worksWith":"Rooms"},{"file":"cust_229.png","name":"Pro Plan transfer","description":"Conforms an older plan to the Pro Plan using the transfer tool.","toolType":"Style Palette","worksWith":"Existing plan objects"}]},{"id":8,"title":"Managed mode","description":"Starting PPX18 projects and design iterations from the Project Browser","blocks":[{"type":"heading","text":"Why PPX18 uses Managed Mode"},{"type":"paragraph","text":"PPX18 must be used in Managed Mode so its pre-linked plan files, layout files, and established views remain connected. These links allow much of the construction-document setup to be ready as soon as drawing begins."},{"type":"paragraph","text":"The PPX18 toolbar configuration keeps the Project Browser turned on so new projects can be started from the prepared PPX18 files."},{"type":"heading","text":"Start a new PPX18 project"},{"type":"paragraph","text":"Start the project from the Project Browser rather than using New Project from the File menu."},{"type":"list","text":"In the Project Browser, expand PPX18."},{"type":"list","text":"Expand the Layouts folder."},{"type":"list","text":"Locate the layout and title-block style you want to use."},{"type":"list","text":"Right-click that layout and choose Make a Copy with Links to Project."},{"type":"paragraph","text":"This copies the selected layout while retaining its links to the PPX18 plan files and the views already sent to that layout."},{"type":"list","text":"In the next dialog box, select the New Project radio button. The other available choice sends the copy to an existing project."},{"type":"list","text":"Complete the command. Chief Architect creates the project with the name New Project because this dialog does not provide a renaming option."},{"type":"list","text":"After the project is created, rename New Project to the correct project name."},{"type":"list","text":"Open the copied layout and linked plan files, then confirm that the prepared views and layout connections were retained."},{"type":"heading","text":"Create a separate design iteration"},{"type":"paragraph","text":"To create a self-contained design iteration, right-click the layout in the Project Browser and choose Make a Copy with Links to a New Folder. Name the new folder for the iteration, such as Design Iteration 2."},{"type":"paragraph","text":"The copied layout and its linked files remain together in the new folder, creating a separate design option without mixing its files with the primary project version."},{"type":"heading","text":"Project Management videos"},{"type":"paragraph","text":"Watch the two embedded Project Management videos in this chapter for a visual walkthrough of the PPX18 Managed Mode workflow."}],"imageRequest":"Project Browser showing PPX18, the Layouts folder, and the Make a Copy with Links to Project command","videos":[{"src":"https://www.youtube-nocookie.com/embed/t7edDorAunI","title":"PPX18 Project Management workflow — video 1"},{"src":"https://www.youtube-nocookie.com/embed/9229WPD_WsI","title":"PPX18 Project Management workflow — video 2"}]},{"id":9,"title":"New construction","description":"Changing Area Analysis schedules and dimension defaults for new-construction projects","blocks":[{"type":"heading","text":"Choose whether you are changing the PPX18 templates or one project"},{"type":"paragraph","text":"PPX18 can be prepared for new construction at the template level or changed inside one individual project. Choose the correct workflow before making these edits."},{"type":"subheading","text":"Set up PPX18 for future new-construction projects"},{"type":"paragraph","text":"To make new construction the standard for future projects, open and edit the PPX18 template plan and the preferred PPX18 template layout. Complete the Area Analysis schedule replacement and dimension-default changes in those template files, then save the templates. New projects started from that prepared PPX18 layout will inherit the new-construction setup."},{"type":"subheading","text":"Change only the current project"},{"type":"paragraph","text":"To change only one project, make these edits in that project's copied plan and layout files. Those changes apply to the current project and do not change the PPX18 template plan or preferred template layout used to start future projects."},{"type":"heading","text":"Remove the A1 layout sheet"},{"type":"paragraph","text":"Open the project layout and delete the A1 sheet that is not required for the new-construction document set. Confirm that the remaining layout pages are numbered and ordered correctly before continuing."},{"type":"heading","text":"Replace the Area Analysis schedule"},{"type":"paragraph","text":"Area Analysis is assembled from multiple schedules positioned together so they appear to be one reporting schedule. One schedule includes existing-coverage reporting, while the new-construction replacement schedule is stored off to the side."},{"type":"list","text":"In the main Working Plan view, use the linked Area Analysis callout in the bar across the top of the screen to open the Area Analysis CAD Detail."},{"type":"list","text":"In the Area Analysis CAD Detail, locate the schedule that includes the existing-coverage notation."},{"type":"list","text":"Select that schedule and slide it off to the side."},{"type":"list","text":"Select the replacement schedule that is currently stored off to the side."},{"type":"list","text":"Drag the replacement schedule into the former schedule's position and align it with the other Area Analysis schedules so the complete report reads as one schedule."},{"type":"list","text":"Confirm that the displayed Area Analysis report no longer includes the existing-coverage schedule."},{"type":"heading","text":"Prepare the manual dimension settings"},{"type":"list","text":"Double-click the Manual Dimension tool to open its settings."},{"type":"list","text":"Open the Setup Automatic panel, then open the Exterior section."},{"type":"list","text":"Turn off Auto Refresh and click OK."},{"type":"heading","text":"Change the dimension default"},{"type":"list","text":"Open the dimension-default drop-down menu."},{"type":"list","text":"Change Rab's Favorite Remodel to Rab's Favorite NC."},{"type":"list","text":"Make this change in the working plan views."},{"type":"list","text":"Repeat the change in the Floor Plan Print view."},{"type":"paragraph","text":"Review both the working views and the Floor Plan Print view to confirm that Rab's Favorite NC is active before adding or refreshing dimensions."}],"imageRequest":"Area Analysis schedule group showing the alternate schedule off to the side, plus the dimension-default menu","images":[{"src":"/images/new-construction-existing-coverage-schedule.png","alt":"Area Analysis schedule section containing Existing Coverage","caption":"Select the schedule section containing Existing Coverage and move it aside before positioning the new-construction replacement"},{"src":"/images/new-construction-dimension-default.png","alt":"Dimension Defaults menu with Rabs Favorite NC highlighted","caption":"Choose -Rabs Favorite-NC from the active Dimension Defaults menu"},{"src":"/images/new-construction-auto-refresh.png","alt":"Dimension Defaults Setup Automatic panel with Auto Refresh circled","caption":"In -Rabs Favorite-Remodel, open Setup Automatic and clear Auto Refresh in the Exterior section"}]},{"id":10,"title":"Project information","description":"Entering PPX18 title-block data with the Project Information tool","blocks":[{"type":"heading","text":"Set up project information in PPX18"},{"type":"paragraph","text":"The Pro Plan is nicknamed and referenced throughout this manual as PPX18. After installing PPX18, set up the desired project information in the template’s Title Block plan using the Project Information tool."},{"type":"heading","text":"Open the Project Information tool"},{"type":"list","text":"Open the PPX18 template’s Title Block plan."},{"type":"list","text":"Click the Project Information tool in the toolbar. The first image identifies its toolbar button."},{"type":"heading","text":"Enter the project data"},{"type":"list","text":"In the Owners list, select the information group you want to edit, such as Project, Designer, Client, Design Load Criteria, Project Team, or Applicable Codes."},{"type":"list","text":"Enter the appropriate information in the Value column beside each field. Under Project, this can include the project name, address, APN, property zone, occupancy group, construction type, scope of work, climate zone, code criteria, code cycle, AHJ, setbacks, maximum height, and maximum stories."},{"type":"list","text":"Review the entries for accuracy, then click OK to save them to the Title Block plan."},{"type":"paragraph","text":"Complete the fields you want PPX18 to use before beginning project documentation. These values provide the project data used by the template’s title-block system."}],"imageRequest":"Project Information tool and data-entry window","images":[{"src":"/images/project-information-toolbar.png","alt":"Project Information toolbar button circled in red","caption":"Project Information tool in the PPX18 toolbar"},{"src":"/images/project-information-window.png","alt":"Project Information window showing owners, fields, and values","caption":"Select an information group, then enter its values in the Project Information window"}]},{"id":11,"title":"Project preferences","description":"Opening and customizing the _all_options_ macro","blocks":[{"type":"heading","text":"Open the _all_options_ macro"},{"type":"paragraph","text":"Open the Macro Management Console by clicking the Text Macro Management button in the toolbar. You can also open it from CAD > Text > Text Macro Management."},{"type":"list","text":"In the Macro Management Console, locate and open _all_options_."},{"type":"list","text":"Highlight all of the macro text and copy it."},{"type":"list","text":"Paste the copied text into an AI chat and describe what you want to change."},{"type":"list","text":"Ask the AI to return the complete macro and to follow the editing instructions written at the top of _all_options_."},{"type":"list","text":"Review the changes, paste the revised macro back into the Macro Management Console, save it, and test the affected labels or tools."},{"type":"heading","text":"What you can customize"},{"type":"list","text":"General plan: font behavior, uppercase text, the layer sets that receive font changes, and eave, ridge, and soffit ventilation values."},{"type":"list","text":"Cabinet labels: abbreviations for cabinet types and accessories, displayed cabinet depth, depth thresholds, excluded layer sets, and layer sets where labels or schedules are hidden."},{"type":"list","text":"Cabinet pricing: markup, small and large drawer-box pricing, full-plywood pricing, and slab, lacquered slab, five-panel, and lacquered five-panel pricing."},{"type":"list","text":"Window labels: schedule number, window type, stacked-label size, dimension separator, superscript display, energy values, SHGC and U-factor limits, arch and egress information, egress layer sets, and window-type abbreviations."},{"type":"list","text":"Door labels: schedule number, door type, stacked-label size, dimension separator, superscript display, energy values, SHGC and U-factor limits, arch information, door-type names, and handing labels."},{"type":"list","text":"Room labels: ceiling-height wording and size rules, plate-height information, vaulted-ceiling wording, rounding, room abbreviations, specialty-room rules, hidden categories, and rooms that use shortened labels."},{"type":"list","text":"Annotation Tool: the wording placed for existing and new rooms, flooring, walls, windows, cabinets, doors, roofs, beams, built-ins, garage doors, access notes, and callouts."},{"type":"list","text":"Stair labels: whether to show stair type, risers, treads, riser height, tread depth, stair width, rise angle, and number of landings."},{"type":"paragraph","text":"Tell the AI exactly how you want the finished labels or values to read. Always review the returned macro and verify the resulting project information before issuance."}],"imageRequest":"Text Macro Management toolbar button","image":"/images/text-macro-management-button.png","imageAlt":"Text Macro Management toolbar button circled in red"},{"id":12,"title":"Area analysis","description":"Parcel, building-area, and coverage reporting from the Area Analysis CAD Detail","blocks":[{"type":"heading","text":"Area Analysis is a CAD Detail"},{"type":"paragraph","text":"The PPX18 Area Analysis is a CAD Detail containing several schedules aligned to look like one reporting schedule. Each section remains an ordinary, editable Chief Architect schedule."},{"type":"heading","text":"Open the Area Analysis CAD Detail"},{"type":"paragraph","text":"Go to the main Working Plan view. In the bar across the top of the screen, open the linked Area Analysis callout. The callout opens the Area Analysis CAD Detail directly."},{"type":"heading","text":"Set up the parcel polyline"},{"type":"paragraph","text":"In both the Working Plot Plan view and the regular Plot Plan view, conform the parcel polyline to the actual property boundary. Enter the correct side lengths and bearings so the closed polyline accurately reports the lot square footage used by Area Analysis."},{"type":"paragraph","text":"Use the plot-plan polyline for parcel reporting instead of shaping the terrain to the property boundary. Keeping the terrain rectangular provides a cleaner model for sloping lots and projected elevation views, where the surrounding landscape needs to remain wide enough to produce appropriate elevation cuts."},{"type":"heading","text":"Review the Area Analysis schedules"},{"type":"paragraph","text":"Open the Area Analysis CAD Detail and review the aligned schedules as a group. Confirm that the lot area, coverage, room areas, project status, and other reported values match the intended project conditions."},{"type":"heading","text":"Find the source of a reported value"},{"type":"paragraph","text":"Because every portion of Area Analysis is a schedule, you can modify and troubleshoot it with Chief Architect's schedule tools."},{"type":"list","text":"Select the schedule containing the value you need to investigate."},{"type":"list","text":"Use Open Row Object to open the object responsible for a selected schedule row."},{"type":"list","text":"Use Find Object in Plan to locate the reporting object in the model."},{"type":"list","text":"Correct the room, polyline, object information, or other source data, then confirm that the schedule updates as expected."},{"type":"heading","text":"Temporarily separate grouped room values"},{"type":"paragraph","text":"When a grouped total is difficult to understand, open the applicable schedule and temporarily add a Room Name column. The added column separates the grouping so individual rooms and their square-footage contributions can be reviewed. Remove the temporary column after troubleshooting and restore the intended schedule formatting."},{"type":"heading","text":"Use the Living Area Totals schedule for troubleshooting"},{"type":"paragraph","text":"In the Plan Tools library folder, locate the Living Area Totals schedule tool. Drop it into any plan view to display the living-area totals being reported by the plan. Use those totals to compare and troubleshoot the output values shown in Area Analysis, then remove the temporary schedule when the review is complete."},{"type":"heading","text":"Verify the finished report"},{"type":"paragraph","text":"Double-check every reported value before relying on Area Analysis for a project document. Rooms sharing a wall with a garage may vary by approximately one to two percent because of how the shared condition is reported; confirm that any variance is acceptable for the project's required reporting standard."}],"imageRequest":"Area Analysis CAD Detail showing its aligned schedules, plus the parcel polyline in a Plot Plan view","images":[{"src":"/images/area-analysis-linked-callout.png","alt":"Area Analysis linked callout in the bar at the top of the Working Plan view","caption":"Double-click the Area Analysis callout in the top bar of the main Working Plan view to open the linked CAD Detail"},{"src":"/images/area-analysis-parcel-polyline.png","alt":"Plot plan parcel polyline labeled with bearings, lengths, lot size, and impervious area","caption":"Conform the closed parcel polyline to the correct property lengths and bearings so it reports the lot area"},{"src":"/images/area-analysis-living-area-totals.png","alt":"Living Area Totals schedule showing room, floor, conditioned area, and unconditioned area","caption":"Drop the Living Area Totals utility from the Area Analysis Tools library folder into a plan view to troubleshoot reported area values"}]},{"title":"Automatic object labels","description":"Adaptive room, window, door, and cabinet labels with project scoping","imageRequest":"Room and window labels before and after automatic abbreviation or stacking, plus the Scoping and Revert tools","blocks":[{"type":"heading","text":"Room labels adapt to the available space"},{"type":"paragraph","text":"PPX18 room labels automatically abbreviate or remove portions of the label as a room becomes smaller in width, height, or overall area. The room name and ceiling-height output respond independently so the label remains appropriate for the available space."},{"type":"paragraph","text":"When a room becomes small enough, PPX18 can stop displaying the room name, the ceiling-height macro, or the complete room label according to the configured thresholds."},{"type":"heading","text":"Room-label thresholds and abbreviations"},{"type":"paragraph","text":"The _all_options_ macro controls the thresholds at which room labels shorten or disappear. Those thresholds are based on the text sizes supplied with PPX18. If you change the room-label text size, also adjust the corresponding thresholds so the label abbreviates at the correct room dimensions."},{"type":"paragraph","text":"The _all_options_ macro also controls the shortened wording. You can change what Ceiling Height abbreviates to, what Bathroom abbreviates to, and the other room-name and ceiling-height abbreviations used by the system."},{"type":"heading","text":"Window labels stack when the window becomes narrow"},{"type":"paragraph","text":"PPX18 knows the designated window-label font size. When a window becomes too narrow for its label to fit within the window width, the label automatically stacks and breaks into multiple lines. This allows several small, unmulled windows to sit next to each other without their labels running together."},{"type":"paragraph","text":"Window labels use the PPX18 custom font for full-height superscript formatting. The displayed components, abbreviations, stacking behavior, and other window-label options are managed in _all_options_."},{"type":"heading","text":"Door labels use the same adaptive approach"},{"type":"paragraph","text":"Door labels can stack or simplify when the door width cannot accommodate the complete label. Their displayed information and abbreviations are also managed through _all_options_."},{"type":"heading","text":"Cabinet labels identify the cabinet type"},{"type":"paragraph","text":"PPX18 evaluates a cabinet's configuration and determines the cabinet type so its label follows familiar cabinet-labeling conventions. The resulting label can coordinate with cabinet schedules and the requirements of the active view."},{"type":"heading","text":"Use Label Replacement for one object"},{"type":"paragraph","text":"Rooms, windows, doors, and cabinets can use Label Replacement when one object needs replacement text, a prefix, or a suffix while retaining the automatic PPX18 label system."},{"type":"heading","text":"Scoping Tool"},{"type":"paragraph","text":"The Scoping Tool in the PPX18 toolbars is linked to the corresponding Scoping Tool in the library. Use it to paint windows, doors, and rooms as existing or out of scope. The displayed result responds to the plan-name suffix."},{"type":"list","text":"A plan name ending in -N identifies a proposed plan."},{"type":"list","text":"A plan name ending in -AB identifies an as-built plan."},{"type":"paragraph","text":"Depending on the plan suffix and object, the Scoping Tool can present the object as existing, out of scope, or to be removed."},{"type":"subheading","text":"Window example in a -N plan"},{"type":"paragraph","text":"Applying the Scoping Tool to a window in a proposed -N plan gives the window an E prefix for existing. Its rough-opening and header-size fields report Not Applicable in the window schedule, and the Window Order Overview plan view also reports it as Not Applicable."},{"type":"subheading","text":"Room example"},{"type":"paragraph","text":"Applying the Scoping Tool to a room adds No Work beneath the room name."},{"type":"heading","text":"Remove the applied scoping"},{"type":"paragraph","text":"Use the Revert tool located next to the Scoping Tool in the PPX18 toolbar to remove the applied scoping effects and return the object to its standard label behavior."}],"chapterLinks":[{"label":"Open the Label Replacement chapter →","targetTitle":"Label replacement"}],"id":13},{"id":14,"title":"Label replacement","description":"Replacing or extending room, window, door, and cabinet labels","blocks":[{"type":"heading","text":"Using Label Replacement"},{"type":"paragraph","text":"Label Replacement is a custom object field for rooms, windows, doors, and cabinets. It changes the reported portion of an object’s label while keeping the PPX18 label system active."},{"type":"list","text":"Open the room, window, door, or cabinet whose label you want to adjust."},{"type":"list","text":"Open the Object Information panel."},{"type":"list","text":"Select the custom field named -Label Replacement."},{"type":"list","text":"Enter the replacement, prefix, or suffix in the Field Value box to the right, then click OK."},{"type":"heading","text":"Replace, add after, or add before"},{"type":"subheading","text":"Replacement"},{"type":"paragraph","text":"Enter text without a plus sign. This replaces the value normally reported for that object."},{"type":"subheading","text":"Add after the normal label"},{"type":"paragraph","text":"Place a plus sign at the beginning, such as +Egress."},{"type":"subheading","text":"Add before the normal label"},{"type":"paragraph","text":"Place a plus sign at the end, such as Existing+."},{"type":"subheading","text":"Remove the room ceiling-height output"},{"type":"paragraph","text":"Enter one character space in Label Replacement. A single space effectively removes the ceiling-height portion of a room label while leaving the rest of the label system active."},{"type":"heading","text":"What gets replaced"},{"type":"paragraph","text":"For a room, Label Replacement replaces the ceiling-height output. For a cabinet, it replaces the cabinet type. For a window or door, it replaces the type code established in the _all_options_ Project Preferences macro."},{"type":"heading","text":"Room ceiling-height formatting"},{"type":"paragraph","text":"Room Label Replacement recognizes dimensions entered in inches and formats them as feet and inches. This is useful when a soffit or vaulted ceiling condition creates a height that Chief Architect does not report as the room’s adjusted ceiling height."},{"type":"paragraph","text":"Example: enter +144\" to Ridge Beam to add 12'-0\" to Ridge Beam after the normal vaulted-ceiling text."},{"type":"heading","text":"Why this remains dynamic"},{"type":"paragraph","text":"Label Replacement changes only the object-specific value. The rest of the label can still respond to the active view. A window can show different schedule, size, and type information in an order overview and a floor-plan view while retaining the same replacement, prefix, or suffix. The same approach keeps room, door, and cabinet labels flexible without breaking the PPX18 label system."}],"imageRequest":"Label Replacement custom field and vaulted-room suffix example","images":[{"src":"/images/label-replacement-field.png","alt":"Window Specification Object Information panel with the Label Replacement field selected","caption":"Select -Label Replacement and enter the object-specific value in Field Value"},{"src":"/images/label-replacement-vaulted-room.png","alt":"Room Specification Object Information showing plus 194 inches To Vault and the formatted room label","caption":"A leading plus appends the suffix; +194 inches To Vault is formatted in the room label as 16 feet 2 inches To Vault"}]},{"id":15,"title":"Walls","description":"Dynamic X18 wall types, display layers, and wall workflow","blocks":[{"type":"heading","text":"How PPX18 wall display works"},{"type":"paragraph","text":"Every exterior, main, and interior component of a PPX18 wall type is assigned to a corresponding display layer. That display layer controls the component's line style, line weight, and fill style through the active Layer Set. This allows the same wall type to display differently across PPX18 Saved Plan Views without editing the wall components again."},{"type":"heading","text":"Exterior-layer convention"},{"type":"paragraph","text":"Assign the outermost exterior component to Walls, Exterior, Layer 1. Moving inward through the wall assembly, assign the next components to Walls, Exterior, Layer 2, Walls, Exterior, Layer 3, and so on in order."},{"type":"heading","text":"Interior-layer convention"},{"type":"paragraph","text":"Assign the outermost interior component—the finish layer facing the room—to Walls, Interior, Layer 1. Additional interior-side components move inward as Walls, Interior, Layer 2, Walls, Interior, Layer 3, and so on."},{"type":"heading","text":"Main wall layers"},{"type":"paragraph","text":"Assign the main structural layers of an exterior wall to the Walls, Exterior main-layer display layer. Assign the main structural layers of an interior wall to the Walls, Interior main-layer display layer. Keeping exterior and interior main layers separate allows their graphics to be controlled independently."},{"type":"heading","text":"New-wall layers for remodel projects"},{"type":"paragraph","text":"PPX18 includes corresponding display layers for new walls. Use those new-wall layer equivalents when the wall represents new construction in a remodel project so new and existing wall graphics can be controlled separately."},{"type":"heading","text":"Convert a wall type that is not supplied with PPX18"},{"type":"list","text":"Open Wall Type Definitions and select or copy the wall type you want to convert."},{"type":"list","text":"Assign every exterior, main, and interior wall component to its appropriate PPX18 display layer using the conventions above."},{"type":"list","text":"After all display layers are assigned, group-select every component layer in the wall definition."},{"type":"list","text":"Click Edit Layer to open Wall Layer Specification for the selected components."},{"type":"list","text":"In Line Style, set the line properties to Default so the assigned display layers control the line color, line style, and line weight. Keep each component's assigned Display Layer unchanged."},{"type":"list","text":"In Fill Style, open the Type menu and choose Use Layer."},{"type":"list","text":"Click OK, save the wall type, and review it in the PPX18 Saved Plan Views that will be used for documentation."},{"type":"paragraph","text":"Once converted, adjust the wall graphics from the applicable Layer Set instead of manually changing the wall type for each view."}],"imageRequest":"Wall Type Definitions and Wall Layer Specification settings for the PPX18 layer method","images":[{"src":"/images/wall-type-display-layers.png","alt":"Wall Type Definitions showing exterior, main, and interior components assigned to PPX18 display layers","caption":"Assign each wall component to its corresponding PPX18 exterior, main, or interior display layer"},{"src":"/images/wall-layer-line-style.png","alt":"Wall Layer Specification Line Style panel for grouped wall components","caption":"Group-select the wall components, open Edit Layer, and let the assigned layers control the line properties"},{"src":"/images/wall-layer-fill-style.png","alt":"Wall Layer Specification Fill Style panel with Type set to Use Layer","caption":"Set Fill Style Type to Use Layer so the active Layer Set controls the wall-component fills"}]},{"id":16,"title":"Detail designations","description":"Organizing and calling out PPX18 construction details","blocks":[{"type":"heading","text":"Open the Detail Designations CAD Detail"},{"type":"paragraph","text":"In the bar across the top of the main Working Plan view, double-click the linked Detail Designations callout. The callout opens the Detail Designations CAD Detail directly."},{"type":"heading","text":"Set the default designation for a floor"},{"type":"paragraph","text":"Each designation category contains numbered schedule slots. Move an existing designation into the slot for the floor where it should become the default."},{"type":"list","text":"Select the existing designation in its schedule."},{"type":"list","text":"Slide it into the No. 1 slot to make it the default designation for Floor 1."},{"type":"list","text":"Slide it into the No. 2 slot to make it the default designation for Floor 2."},{"type":"list","text":"Review the related detail annotations to confirm that the selected floor now reports the intended designation."},{"type":"heading","text":"Change an existing designation"},{"type":"paragraph","text":"Select the annotation row in the schedule and use Open Row Object to open the existing note. In the Note Specification dialog, open Object Information, select -Label Replacement, and edit the Field Value. Saving that value changes every detail annotation that uses that item."},{"type":"heading","text":"Duplicate a designation and add another option"},{"type":"paragraph","text":"Select the annotation row and use Find Object in Plan to locate its source note. Duplicate that note to create an additional designation. Open the duplicate, go to Object Information, select -Label Replacement, and enter the new designation in the Field Value. Confirm that the new note appears in the schedule, then place it in the required numbered floor slot."},{"type":"heading","text":"Verify the connected annotations"},{"type":"paragraph","text":"After changing a designation, review the construction details that use it. The roof-rafter example shows the revised framing designation carried into the connected detail annotation."}],"imageRequest":"Detail Designations Page showing its current categories and a linked callout","images":[{"src":"/images/detail-designations-linked-callout.png","alt":"Linked Detail Designations callout in the top bar of the Working Plan view","caption":"Double-click the linked Detail Designations callout to open its CAD Detail"},{"src":"/images/detail-designations-floor-slots.png","alt":"Roof Framing designation schedule with numbered floor slots","caption":"Move a designation into slot 1 or slot 2 to establish the default for that floor"},{"src":"/images/detail-designations-label-replacement.png","alt":"Note Specification Object Information panel showing the Label Replacement field","caption":"Edit the note's -Label Replacement Field Value to change the designation"},{"src":"/images/detail-designations-roof-rafter-result.png","alt":"Roof detail showing the updated roof-rafter annotation","caption":"The changed roof-framing designation updates the connected roof-rafter annotation"}]},{"title":"Details","description":"Adapting construction details to PPX18 layers, fills, and global annotations","imageRequest":"A 4×4 grid detail or stackable detail showing its aligned polylines, display layers, and linked annotations","blocks":[{"type":"heading","text":"Start by duplicating an existing PPX18 detail"},{"type":"paragraph","text":"The easiest way to bring another construction detail into PPX18 is to duplicate an existing CAD Detail and adapt it. PPX18 includes 4×4 grid details and stackable details. These details are drawn in the same XY position so their components remain aligned with the system."},{"type":"list","text":"Find an existing 4×4 grid detail or stackable detail that is closest to the condition you need."},{"type":"list","text":"Duplicate that CAD Detail instead of beginning in an empty CAD Detail window."},{"type":"list","text":"Keep the duplicated drawing in the established XY position."},{"type":"list","text":"Manipulate the existing polylines so they match the construction detail you are adding."},{"type":"heading","text":"Use the existing layer-based fill system"},{"type":"paragraph","text":"Every detail polyline receives its fill from the layer on which it resides. For example, an insulation polyline resides on the Details, Dash, Insulation layer. Editing that layer's fill style changes the appearance of insulation polylines throughout the detail family."},{"type":"paragraph","text":"This layer-based system allows PPX18 to change the graphic appearance of an entire family of construction details globally instead of editing each polyline independently."},{"type":"heading","text":"Convert polylines from another detail"},{"type":"paragraph","text":"When bringing in polylines from another detail, use the Fill Style Eyedropper to sample the fill from an existing PPX18 polyline, then paint that fill onto the polyline you are converting. Confirm that the converted polyline is also assigned to the appropriate PPX18 detail layer so its fill remains controlled by that layer."},{"type":"heading","text":"Add globally controlled detail annotations"},{"type":"paragraph","text":"Open the Pro Plan Tools library folder, then open Detail Designations. The annotations in this folder contain global macro calls connected to the Detail Designations system."},{"type":"list","text":"Choose the required annotation from Pro Plan Tools > Detail Designations."},{"type":"list","text":"Click the annotation into the CAD Detail."},{"type":"list","text":"Position its text and leader for the construction condition."},{"type":"paragraph","text":"Because the library annotation is connected to the global Detail Designations system, its wording can be managed across every detail that uses that designation."},{"type":"heading","text":"PPX18 detail workflow overview"},{"type":"list","text":"Duplicate an existing detail so the drawing begins in the correct XY position."},{"type":"list","text":"Reuse or reshape its polylines and keep each polyline on the correct PPX18 detail layer."},{"type":"list","text":"Use the Fill Style Eyedropper when converting outside polylines into the layer-based fill system."},{"type":"list","text":"Drop annotations from Pro Plan Tools > Detail Designations into the CAD Detail so they remain globally connected."}],"chapterLinks":[{"label":"Open the Detail Designations chapter →","targetTitle":"Detail designations"}],"id":17},{"id":18,"title":"Stackable details","description":"Building adaptable detail sections from coordinated components","blocks":[{"type":"heading","text":"Stackable detail sections"},{"type":"paragraph","text":"PPX18 stackable details are coordinated detail components that can be combined and switched for the construction condition being documented. Use them to assemble a section from prepared parts instead of redrawing a complete condition."},{"type":"list","text":"Open the applicable CAD detail and select the stackable detail component."},{"type":"list","text":"Use its available controls to choose the construction condition required for the project."},{"type":"list","text":"Align the components, remove options that do not apply, and review the complete section at its intended print scale."},{"type":"list","text":"Add the correct detail designation and verify every note before placing the detail on a layout."}],"imageRequest":"One PPX18 stackable detail with its available configuration controls visible"},{"id":19,"title":"Annotation tool","description":"Creating automatic object-linked annotations throughout a plan","blocks":[{"type":"heading","text":"What the Annotation Tool does"},{"type":"paragraph","text":"The PPX18 Annotation Tool creates a note from the object to which it is linked. Link it to a window, door, wall, stair, room, or library object and it reports the information appropriate to that object. The supplied windows, doors, and walls are already prepared for this system, making it possible to annotate much of a plan with one consistent tool."},{"type":"heading","text":"Link the tool to an object"},{"type":"list","text":"Choose the Annotation Tool from the PPX18 toolbar and place it in the plan."},{"type":"list","text":"Link its leader to the object you want to describe."},{"type":"list","text":"Move the note or leader as needed, then confirm that the reported wording is correct for the view."},{"type":"paragraph","text":"The result depends on the linked object. A stair annotation can report the number of risers and treads, riser height, tread depth, stair width, and rise angle. Walls and other prepared objects can report instructions such as new, existing, or to be removed."},{"type":"heading","text":"Set an object's preferred annotation"},{"type":"paragraph","text":"Open the object, go to Object Information, and select the Anno Tool custom field. Enter the wording you want the Annotation Tool to use. If this field is blank, the tool uses the object's available description or label."},{"type":"paragraph","text":"To reuse the same wording, save the completed object back to your library. Each time that library object is placed and linked to the Annotation Tool, its saved annotation is ready to report."},{"type":"heading","text":"Use different wording for proposed and as-built plans"},{"type":"paragraph","text":"In the Anno Tool field, enter the proposed wording first and the as-built wording second, separated by a colon."},{"type":"list","text":"A plan file ending in -N uses the proposed wording before the colon."},{"type":"list","text":"A plan file ending in -AB uses the as-built wording after the colon."},{"type":"paragraph","text":"This lets the same saved object produce the appropriate annotation in proposed and as-built plan files."},{"type":"heading","text":"Use the tool without linking it"},{"type":"paragraph","text":"When the Annotation Tool is placed inside a room without being linked to an object, it reports the material applied to that room's floor."},{"type":"heading","text":"Report the annotation in a Keynote schedule"},{"type":"paragraph","text":"The supplied AnnoTools macro is loaded into the Note tool for use in any view. Place a Keynote and leave its text field set to the AnnoTools macro. The Annotation Tool result will then report through the Keynote schedule."}],"imageRequest":"Provided: Annotation Tool toolbar button, Anno Tool custom field, and stair output example","images":[{"src":"/images/annotation-tool-toolbar.png","alt":"PPX18 toolbar with the Annotation Tool button circled","caption":"Choose the Annotation Tool from the PPX18 toolbar."},{"src":"/images/annotation-tool-custom-field.png","alt":"Wall Specification Object Information panel with the Anno Tool custom field selected","caption":"Enter object-specific wording in Object Information > Anno Tool."},{"src":"/images/annotation-tool-stair-output.png","alt":"A stair linked to an automatic annotation reporting stair dimensions and counts","caption":"A linked stair can automatically report its risers, treads, dimensions, width, and rise angle."}]},{"id":20,"title":"Pro Layout","description":"Using the coordinated PPX18 layout templates and automatic layout labels","blocks":[{"type":"heading","text":"Choose a Pro Layout"},{"type":"paragraph","text":"PPX18 includes ten coordinated Pro Layout templates. Choose the template that matches the intended sheet size and project presentation before sending views to layout."},{"type":"heading","text":"Send and align views"},{"type":"paragraph","text":"Send the prepared Saved Plan View, camera, schedule, or CAD detail to layout at the required scale. Use the layout snapping and alignment guides to maintain the established title and label locations."},{"type":"heading","text":"Automatic layout labels"},{"type":"paragraph","text":"PPX18 layout boxes use scalable text styles and automatic labeling. Right-justified labels are pinned to layout-box corners so the label can remain aligned when the box is resized. Confirm the view name, scale, and sheet reference before issuance."}],"imageRequest":"A PPX18 layout page showing aligned layout boxes and automatic labels"},{"id":21,"title":"Braced wall panels","description":"Braced wall lines, panel reporting, and the BWP Saved Plan View","blocks":[{"type":"heading","text":"Braced Wall Panel workflow"},{"type":"paragraph","text":"Use the PPX18 BWP Saved Plan View when placing and reviewing braced wall information. Its layers and draw order are prepared to keep braced wall lines, panel graphics, framing information, and labels legible."},{"type":"list","text":"Establish the braced wall lines for the project in the BWP view."},{"type":"list","text":"Place or assign the required braced wall panels and confirm their relationship to openings and framing."},{"type":"list","text":"Review the BWP schedule. PPX18 uses ABC conventions and IRC-indexed fastening information to coordinate the reported designations."},{"type":"list","text":"Set the applicable code references and design-load information in the PPX18 project tools, then verify the resulting schedule against the project requirements."}],"imageRequest":"BWP Saved Plan View showing braced wall lines, panels, and the PPX18 schedule"},{"id":22,"title":"Ventilation tools","description":"Roof ventilation and label flexibility","blocks":[{"type":"heading","text":"Label Replacement Flexibility"},{"type":"paragraph","text":"The Label Replacement feature provides crucial flexibility for complex"},{"type":"heading","text":"ventilation scenarios. Here's a practical example"},{"type":"heading","text":"Imagine a house with three roof planes"},{"type":"paragraph","text":"Roof Plane 1: 30 feet long, needs ridge vent Roof Plane 2: 20 feet long, needs high vent (no ridge vent) Roof Plane 3: 25 feet long, no high vent needed (served by other vents)"},{"type":"heading","text":"Setup"},{"type":"paragraph","text":"Set \"Provide Ridge Vent\" to true in Project Designations"},{"type":"heading","text":"For Roof Plane 1"},{"type":"heading","text":"Leave Label Replacement empty"},{"type":"paragraph","text":"System will calculate ridge vent normally"},{"type":"heading","text":"For Roof Plane 2"},{"type":"paragraph","text":"Enter the high vent's net free area in Label Replacement Example: If using a 60-square-inch high vent, enter 60 in Label"},{"type":"heading","text":"Replacement"},{"type":"heading","text":"For Roof Plane 3"},{"type":"paragraph","text":"Enter 0 in Label Replacement This prevents the system from calculating ridge vent for this plane"},{"type":"heading","text":"This flexibility allows you to"},{"type":"paragraph","text":"Mix and match ventilation methods on different roof planes Use high vents instead of ridge vents where appropriate Zero out ventilation calculations for areas served by other vents Maintain accurate calculations while accommodating complex ventilation needs The system's ability to handle these variations makes it particularly"},{"type":"heading","text":"valuable for"},{"type":"paragraph","text":"Houses with multiple roof planes Projects using different ventilation methods Situations where some attic spaces are served by different ventilation systems Cases where you need to exclude certain areas from ventilation calculations Remember that the Label Replacement value overrides the automatic calculation for that specific roof plane, giving you precise control over"},{"type":"paragraph","text":"the ventilation calculations while maintaining the automation benefits of the system."},{"type":"paragraph","text":"The roof vent calculator schedule is automatically sent to both the ANCI D and ARCH D layouts. Users can access and edit this schedule in two"},{"type":"heading","text":"ways"},{"type":"heading","text":"1.Through the Project Browser"},{"type":"paragraph","text":"Navigate to the Schedules subfolder Find the roof vent calculator schedule as a standalone schedule"},{"type":"heading","text":"2.Through the Roof Plane"},{"type":"paragraph","text":"Click on any roof plane In the edit toolbar, select \"Find Schedule from Object\" This will target the roof vent calculator schedule This flexibility in accessing the schedule allows users to make necessary edits or adjustments to the calculations as needed during the project."},{"type":"heading","text":"ROOF VENT NFA CALCULATOR"},{"type":"heading","text":"ROOF VENT NFA CALCULATOR CONT."},{"type":"paragraph","text":"The Roof Vent Calculation system represents a significant advancement in automating net free area calculations for roof ventilation. Unlike traditional manual calculations, this system can be set up once in your template plan and then forgotten about, as long as you consistently use the same ventilation products. This automation saves considerable time and reduces calculation errors."},{"type":"heading","text":"Understanding the Input Values"},{"type":"paragraph","text":"Before setting up the system, you need to gather the correct net free area values from your ventilation product vendors."},{"type":"paragraph","text":"Location: Auto Build Roof menu > Auto Build Roof Directives > Macro"},{"type":"heading","text":"Number Inputs 7-9"},{"type":"heading","text":"Input Mapping"},{"type":"list","text":"Macro Number Input 7: Eave Block Vent NFA (square inches per vent)"},{"type":"paragraph","text":"Used for calculating ventilation when eave block vents are present (no soffit area)"},{"type":"list","text":"Macro Number Input 8: Ridge Vent NFA (square inches per linear foot)"},{"type":"paragraph","text":"Used for calculating ridge vent net free area when ridge vent is provided"},{"type":"list","text":"Macro Number Input 9: Soffit Vent NFA (square inches per linear foot)"},{"type":"paragraph","text":"Used for calculating ventilation when soffit vents are present (soffit area > 0) Note: All inputs are in square inches. The system automatically converts these to square feet by dividing by 144."},{"type":"heading","text":"For Eave Blocks"},{"type":"paragraph","text":"Vendors typically list net free area in square inches per block The system will automatically convert this to square feet in the final calculation Example: If your eave block provides 9 square inches of net free area, you would enter 9 in Automatic Roof Vent/Object Information"},{"type":"heading","text":"Panel/Custom Field/?Macro Number Input 7\""},{"type":"heading","text":"For Soffit and Ridge Vents"},{"type":"paragraph","text":"Vendors usually list total net free area for the entire vent length The system needs this value per linear foot You must convert the vendor's total value to a per-foot basis"},{"type":"heading","text":"Ventilation Method Switching"},{"type":"paragraph","text":"The system automatically switches between two ventilation methods"},{"type":"heading","text":"based on your ridge vent designation"},{"type":"heading","text":"When \"Provide Ridge Vent\" is set to true"},{"type":"paragraph","text":"Uses 1/300 method (less ventilation required due to ridge vent) System calculates based on ridge vent length and pattern"},{"type":"heading","text":"When \"Provide Ridge Vent\" is set to false"},{"type":"paragraph","text":"Uses 1/150 method (more ventilation required) System calculates based on eave/soffit ventilation only, by unchecking or checking soffit in the structure panel of your roof plane or auto-build roof dialog"}],"imageRequest":"Optional screenshot or diagram for Ventilation tools"},{"title":"Framing","description":"Building and editing framing with PPX18 Saved Plan Views","imageRequest":"PPX18 floor framing plan with beams, joists, fills, and rough-opening labels visible","blocks":[{"type":"heading","text":"Layer-based framing graphics"},{"type":"paragraph","text":"All framing members in PPX18 are set to use layer-based fill styles. This allows the same framing member to have a distinctive appearance from one Saved Plan View to another, making the framing easier to identify while you work and giving each printed view the appropriate graphic treatment."},{"type":"paragraph","text":"Framing layers are turned on only in the Saved Plan Views where they are needed. The supplied Framing and Working Saved Plan Views are already established to show the appropriate framing layers and are coordinated for the PPX18 print set."},{"type":"heading","text":"Build all framing"},{"type":"list","text":"Click the Build All Framing tool to generate the project's framing members."},{"type":"list","text":"When Chief Architect asks whether it should turn on display layers that are not currently displayed, choose No."},{"type":"list","text":"After the framing is built, switch to any Framing Saved Plan View or Working Saved Plan View to view and edit the framing members."},{"type":"paragraph","text":"Choosing No keeps the current view's established layer display intact. The framing is still built; it becomes visible when you move to a Saved Plan View that is designed to display those members."}],"id":23},{"title":"Kitchen and cabinet workflow","description":"Quick tools, NKBA dimensions, cabinet schedules, and installation details","imageRequest":"Current PPX18 kitchen side panel and a dimensioned cabinet elevation","blocks":[{"type":"heading","text":"Kitchen Quick Tools"},{"type":"paragraph","text":"The PPX18 kitchen toolbars and side panel provide single-action tools for common cabinet changes and placements. Select the cabinet or work area, then use the matching tool for drawers, doors, fillers, corners, panels, appliances, tray dividers, lighting, sinks, and countertop conditions."},{"type":"heading","text":"Kitchen dimensions"},{"type":"paragraph","text":"Use the prepared NKBA dimension defaults for left, right, and center elevation dimensions. Additional defaults support counter-only dimensions, wall-to-wall dimensions, and interior dimensions offset to the exterior for ANSI B kitchen work."},{"type":"heading","text":"Schedules and labels"},{"type":"paragraph","text":"PPX18 cabinet schedules can report door and drawer information, box volume, and custom pricing. Review the cabinet labels in plan and elevation views, then confirm the schedule values before issuance."},{"type":"heading","text":"Installation documentation"},{"type":"paragraph","text":"Use the dynamic installation-spec CAD details for installation diagrams. Choose the applicable options, add the correct designation, and verify the finished detail against the designed cabinets."}],"id":24},{"title":"Spreadsheet integration","description":"Optional CSV, Google Sheets, and Excel data workflows","imageRequest":"The PPX18 spreadsheet-linking setup and one resulting Chief Architect schedule","blocks":[{"type":"heading","text":"Optional project-data add-on"},{"type":"paragraph","text":"PPX18 includes a user-configurable add-on for bringing supported project data into advanced schedule and project-information workflows. Supported sources can include BuilderTrend output, JobTread output, a generic CSV file, Google Sheets, or Excel."},{"type":"heading","text":"Set up the connection"},{"type":"paragraph","text":"Because column names, file locations, permissions, and business workflows differ, configure this system for the specific data source. The preliminary connection can be completed during Assisted Install."},{"type":"list","text":"Choose the source and identify the fields that should appear in Chief Architect."},{"type":"list","text":"Create a small test dataset and connect it to a test schedule."},{"type":"list","text":"Refresh the data and verify field names, values, units, and blank cells."},{"type":"list","text":"Document the approved refresh process before using linked data on an active project."},{"type":"paragraph","text":"This add-on is separate from the standard PPX18 Project Information tool used for title-block and built-in project data."}],"id":25},{"title":"Materials and exterior graphics","description":"PPX18 cladding, roof, trim, texture, and rendering assets","imageRequest":"Rendered PPX18 exterior identifying cladding, shingles, trim, siding, and concrete materials","blocks":[{"type":"heading","text":"Prepared exterior systems"},{"type":"paragraph","text":"PPX18 includes coordinated exterior assets for practical modeling and presentation, including 3D cladding profiles, composition-shingle roofing, siding, window and door casings, a custom sill, frieze and gable shadow-board moldings, gutter guard, and concrete textures."},{"type":"heading","text":"Apply the supplied material or assembly"},{"type":"paragraph","text":"Use the PPX18 wall type, material, molding, or toolbar tool that matches the intended assembly. Review the result in both the construction-document view and the rendering camera because linework and rendered surfaces serve different purposes."},{"type":"heading","text":"Performance-conscious graphics"},{"type":"paragraph","text":"Included textures, bump and ambient-occlusion maps, aggregated plan materials, and WEBP library images are prepared to balance realism with file performance. Avoid unnecessarily duplicating materials or using oversized replacement images."}],"id":26},{"title":"Cameras and dimensions","description":"Prepared camera views, rendering settings, and dimension defaults","imageRequest":"PPX18 camera list beside a finished elevation or rendering, plus one dimension-default example","blocks":[{"type":"heading","text":"Camera systems"},{"type":"paragraph","text":"Use the prepared PPX18 Saved Cameras for elevations, sections, framing views, redlines, and renderings. Before sending a camera to layout, confirm its Layer Set, rendering technique, clipping or back-clip depth, line weights, and callout direction."},{"type":"heading","text":"Rendering cameras"},{"type":"paragraph","text":"PPX18 camera settings, lighting symbols, backdrops, and materials provide a coordinated starting point for presentation views. Adjust the camera for the project, then verify lighting, exposure, backdrop, and material scale rather than rebuilding the camera system."},{"type":"heading","text":"Dimension defaults"},{"type":"paragraph","text":"Choose the PPX18 dimension default intended for the drawing task before placing dimensions. Prepared defaults support architectural plans, new-construction wall conditions, roofs, framing, and NKBA kitchen workflows. Verify the located objects, rounding, text position, and final layout scale."}],"id":27},{"id":28,"title":"Update or Install Instructions","description":"Installing PPX18 libraries and toolbar configurations, or replacing an earlier installation","blocks":[{"type":"heading","text":"Before you begin"},{"type":"paragraph","text":"Close active projects, save backups of any customized PPX18 files, and keep the downloaded PPX18 library and Toolbars folder available. When updating an existing installation, remove only the older library content that the new download replaces."},{"type":"heading","text":"Remove the library being replaced"},{"type":"list","text":"Open the Library Browser and locate the older Rabbitt Design library inside the User Catalog. Search for Rab-related items if needed, then identify the exact folder being replaced."},{"type":"list","text":"Right-click that folder and choose Delete. Be precise: if you are replacing kitchen tools, do not delete unrelated bathroom or other Rabbitt Design libraries."},{"type":"list","text":"Allow the deletion to finish. A large library may take several minutes and, on some systems, as long as 10 minutes."},{"type":"heading","text":"Empty the Trash catalog"},{"type":"paragraph","text":"Deleted library items move to the Trash or User Trash catalog. Right-click the Trash catalog and choose Empty Trash. This prevents the deleted items from being recognized as possible duplicates during installation."},{"type":"heading","text":"Install the replacement library"},{"type":"list","text":"After the Trash catalog is empty, open the supplied CALIBZ library file to import the updated PPX18 library."},{"type":"list","text":"If Windows has associated CALIBZ files with an earlier Chief Architect version, change the file association to Chief Architect X18 before opening the file."},{"type":"paragraph","text":"Users moving from an older Pro Plan may still have legacy tags whose names begin with a period. PPX18 uses the newer numbered tag system. Remove obsolete legacy tags only after confirming they are no longer needed."},{"type":"heading","text":"Install the toolbar configurations"},{"type":"list","text":"In Chief Architect, open Tools > Toolbars and Hotkeys > Customize Toolbars."},{"type":"list","text":"Open the Configurations panel and choose Import."},{"type":"list","text":"Browse to the downloaded Toolbars folder and select all TOOLBAR files contained in that folder."},{"type":"list","text":"Choose Replace All to replace the previous configurations."},{"type":"list","text":"If the library was installed correctly, Chief Architect will display an Importing Place Library Object Buttons message. Allow the import to finish."},{"type":"list","text":"If a selection dialog appears, choose Select All New and press Done."},{"type":"heading","text":"Verify the installation"},{"type":"paragraph","text":"Select several PPX18 toolbar tools and confirm that they open or place the expected library objects. Also verify the library folders, toolbar configurations, templates, macros, labels, schedules, Saved Plan Views, and layouts before continuing work on an active project."}],"imageRequest":"Library removal, trash cleanup, and toolbar import screens from the supplied installation guide","images":[{"src":"/images/install-update/pdf-image-12.jpg","alt":"Chief Architect User Catalog with an outdated library folder selected for deletion","caption":"Delete only the outdated Rabbitt Design library folder you intend to replace"},{"src":"/images/install-update/pdf-image-18.png","alt":"Chief Architect Trash catalog menu with Empty Trash selected","caption":"Empty the Trash catalog before opening the replacement CALIBZ library file"},{"src":"/images/install-update/pdf-image-23.jpg","alt":"Chief Architect Tools menu showing Customize Toolbars","caption":"Open Tools > Toolbars and Hotkeys > Customize Toolbars"},{"src":"/images/install-update/pdf-image-3.jpg","alt":"Toolbar Configuration dialog showing imported toolbar configurations","caption":"In Configurations, choose Import and select every TOOLBAR file in the downloaded Toolbars folder"},{"src":"/images/install-update/pdf-image-4.jpg","alt":"Importing Place Library Object Buttons progress dialog","caption":"Allow Chief Architect to finish importing the Place Library Object buttons"},{"src":"/images/install-update/pdf-image-5.jpg","alt":"Toolbar Configuration import dialog with new items selected","caption":"When prompted, choose Select All New, then press Done"}]},{"id":29,"title":"Transfer to Pro Plan","description":"Applying PPX18 systems to an active Chief Architect plan","blocks":[{"type":"heading","text":"Pro Plan Transfer Tool"},{"type":"paragraph","text":"The Pro Plan Transfer Tool applies PPX18 systems to an active plan and reduces the number of individual setup steps required before using PPX18 views, layers, defaults, labels, and documentation tools."},{"type":"list","text":"Save a backup copy of the active plan before beginning."},{"type":"list","text":"Open the plan in the supported Chief Architect X18 environment and run the Pro Plan Transfer Tool from the PPX18 toolbar."},{"type":"list","text":"Follow the tool prompts, then review Saved Plan Views, Layer Sets, Default Sets, wall types, labels, schedules, and layout connections."},{"type":"list","text":"Enter the current project data in Project Information and review the _all_options_ project preferences."},{"type":"paragraph","text":"After transfer, test representative rooms, walls, windows, doors, cabinets, annotations, and schedules before continuing production work."}],"imageRequest":"Pro Plan Transfer Tool button and its completed transfer result"},{"id":30,"title":"Layout user options","description":"Accessing and editing Layout settings","blocks":[{"type":"heading","text":"Overview"},{"type":"paragraph","text":"The Layout User Options are controlled through a text file that you can access from the right sidebar in Layout. This guide will show you how to access and modify these settings to customize your project documentation."},{"type":"heading","text":"Accessing the Settings File"},{"type":"list","text":"Open Layout and go to the G1 page (main page)"},{"type":"list","text":"Look for the right sidebar"},{"type":"list","text":"Find and click on the text file icon labeled \"Layout Label Options\""},{"type":"list","text":"This opens the configuration file where you can modify all settings"},{"type":"heading","text":"Understanding the Settings File"},{"type":"paragraph","text":"The file contains several sections with values you can change. Each"},{"type":"heading","text":"setting is formatted as"},{"type":"paragraph","text":"%$setting_name = \"value\"%"},{"type":"heading","text":"Floor Configuration"},{"type":"paragraph","text":"These settings control how your floor levels are labeled and displayed throughout your project."},{"type":"heading","text":"1. Walkout Basement Settings"},{"type":"paragraph","text":"Find the line: %$is_walkout = \"false\"% Change \"false\" to \"true\" if you have a walkout basement Change \"true\" to \"false\" if you don't have a walkout basement This affects all floor labels, section views, and related documentation"},{"type":"heading","text":"2. Floor Names"},{"type":"paragraph","text":"Find the line: %$floor1Name = \"Basement\"% Change \"Basement\" to your preferred basement name Find the line: %$mainFloorName = \"Main Level\"% Change \"Main Level\" to your preferred main floor name These names appear in all floor labels, section views, and related documentation"},{"type":"heading","text":"3. Story Prefix Removal"},{"type":"paragraph","text":"Find the line: %$removeStory = \"schedule, scale, plot, plat, roof, foundation, cross, section, elevation, render, window\"% Add or remove keywords to control which views don't show floor prefixes Separate keywords with commas For example, \"Foundation Plan\" won't show a floor prefix, while \"Floor"},{"type":"heading","text":"Plan\" will"},{"type":"heading","text":"Box Label Configuration"},{"type":"paragraph","text":"These settings control the appearance of your layout box labels."},{"type":"heading","text":"1. Label Padding"},{"type":"paragraph","text":"Find the line: %$box_label_padding = \"14\"% Change the number to adjust spacing in box labels Find the line: %$box_label_char = \" \"% Change the character between quotes to use a different spacing character"},{"type":"heading","text":"FIRST TIME OPENING LAYOUT"},{"type":"heading","text":"LAYOUT USER OPTIONS"},{"type":"paragraph","text":"Simplified Workflow with X17 Layout in Managed Mode Using the X17 Layout in managed mode has never been more straightforward and user-friendly. This version introduces a range of new features that significantly enhance its functionality compared to previous iterations, especially with our ProPlan and Pro Layout."},{"type":"paragraph","text":"Key Advantages of Using X17 in Managed Mode When installed correctly, the ProPlan and ProLayout become a standalone CA project file accompanied by several secondary files."},{"type":"paragraph","text":"This setup allows you to easily copy the CA project file, rename it, and instantly kick off your new project."},{"type":"paragraph","text":"A standout feature of this workflow is that you can begin drawing in the plan and immediately see those alterations reflected in the layout once opened."},{"type":"heading","text":"Improved Linking Process"},{"type":"paragraph","text":"In earlier versions, users had to relink files, which often triggered confusing dialog boxes. While this remains the case in unmanaged mode, where relinking is necessary, it can be a bit daunting at first. However, when you open the layout in managed mode after copying your CA project file, the links are pre-established."},{"type":"heading","text":"Starting Your Project"},{"type":"paragraph","text":"In a remodel workflow, begin your as-built by drawing in the“Pro Plan-N” version."},{"type":"paragraph","text":"After completing the as-built in the Pro Plan-N file, save your work and utilize the \"Replace With\" option to swap out the file."},{"type":"paragraph","text":"This process preserves all links to the layout."},{"type":"heading","text":"Here’s how to do it"},{"type":"list","text":"With Layout Closed(If Applicable) Save the Pro Plan-N file after"},{"type":"paragraph","text":"drawing your project."},{"type":"list","text":"Right-click on your“Pro Plan-AB” file within the CA project file and"},{"type":"paragraph","text":"choose the option to“Replace With”"},{"type":"list","text":"Click Replace in the next dialog box which confirms the file you are"},{"type":"paragraph","text":"replacing is sent to multiple layout files, this is correct"},{"type":"list","text":"Expand The Pro Plan Project File by clicking on the Carrot to expand"},{"type":"list","text":"Selec the ProPlan-N file and click on select. Thats it, you have"},{"type":"paragraph","text":"successfully injected what is drawn in the ProPlan-N file into the Pro"},{"type":"heading","text":"Plan-AB file"},{"type":"paragraph","text":"This method not only transfers your plan into the new document but also ensures all layout links are intact. This means that when you open the layout, both your house model and new plan will be linked, allowing for seamless drawing and automatic population of views."}],"imageRequest":"Optional screenshot or diagram for Layout user options"},{"id":31,"title":"Common layout tasks","description":"Walkout basements and custom floor names","blocks":[{"type":"heading","text":"Common Tasks"},{"type":"
